<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Elysium Offline Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            margin:0; padding:0; font-family:system-ui,sans-serif; 
            overflow:hidden; background:#111; color: white;
        }
        #map { 
            position:absolute; top:0; bottom:0; left:0; right:0; 
        }
        .controls {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.88); color: white; border-radius: 10px; 
            padding: 12px; min-width: 240px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        select, button { 
            width: 100%; padding: 10px; margin: 6px 0; border-radius: 6px; 
            background: #222; color: white; border: none; font-size: 15px;
        }
        button { background: #3388ff; font-weight: bold; }
        button:active { background: #2266cc; }
        .storage-info { 
            font-size: 0.85em; color: #aaa; margin: 8px 0; line-height: 1.4;
        }
        .warning { color: #ffcc00; font-weight: bold; }
        .layer-item {
            display: flex; align-items: center; gap: 8px; 
            padding: 8px 0; border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls">
        <h3 style="margin:0 0 12px 0; color:#ddd;">🗺️ Elysium Offline Map</h3>
        
        <select id="current-layer" onchange="setCurrentLayer(this.value)"></select>
        
        <button onclick="addNewLayer()">+ New Layer</button>
        <button onclick="toggleMeasure()">📏 Measure Distance</button>
        <button onclick="locateMe()">📍 My Location (GPS)</button>
        
        <details style="margin-top:10px;">
            <summary style="cursor:pointer; padding:8px; background:#222; border-radius:6px;">⚙️ Layers & Cache</summary>
            <div id="layers-list" style="margin-top:8px;"></div>
            
            <button onclick="clearOldCache()" style="background:#cc4444; margin-top:12px;">
                🧹 Clear Old Cache (30+ days)
            </button>
        </details>
        
        <div class="storage-info" id="storage-info">Storage used: calculating...</div>
        
        <button onclick="exportData()">Export Markers (GeoJSON)</button>
        <button onclick="document.getElementById('import-file').click()">Import Markers</button>
        <input type="file" id="import-file" accept=".geojson" onchange="importData(event)" style="display:none;">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const CENTER = [-30.47, 30.63];
        const START_ZOOM = 13;

        let map, layers = {}, layerData = {}, currentLayerName = "Default";
        let measureMode = false, measurePoints = [];

        function loadData() {
            const saved = localStorage.getItem('elysiumMapData');
            layerData = saved ? JSON.parse(saved) : {"Default": [], "Hiking": [], "Fishing": [], "Spots": []};
        }

        function saveData() {
            localStorage.setItem('elysiumMapData', JSON.stringify(layerData));
        }

        function initMap() {
            map = L.map('map', { zoomControl: true }).setView(CENTER, START_ZOOM);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            loadData();
            Object.keys(layerData).forEach(name => createLayer(name));
            renderLayerList();
            setCurrentLayer("Default");

            map.on('click', e => {
                if (measureMode) { handleMeasure(e.latlng); return; }
                addMarker(e.latlng);
            });

            initStorageMonitoring();
        }

        function createLayer(name) {
            if (layers[name]) return;
            layers[name] = L.layerGroup().addTo(map);
            if (layerData[name]) {
                layerData[name].forEach(d => {
                    const m = L.marker([d.lat, d.lng], {draggable:true}).addTo(layers[name]);
                    m.bindPopup(`<b>${name}</b><br><textarea>${d.note||''}</textarea><br><button onclick="saveNote(this)">Save</button> <button onclick="deleteMarker(this)">Delete</button>`);
                    m.on('dragend', saveData);
                });
            }
        }

        function addMarker(latlng) {
            const marker = L.marker(latlng, {draggable:true}).addTo(layers[currentLayerName]);
            marker.bindPopup(`<b>${currentLayerName}</b><br><textarea placeholder="Add note..."></textarea><br><button onclick="saveNote(this)">Save</button> <button onclick="deleteMarker(this)">Delete</button>`).openPopup();
            marker.on('dragend', saveData);
            if (!layerData[currentLayerName]) layerData[currentLayerName] = [];
            layerData[currentLayerName].push({lat: latlng.lat, lng: latlng.lng, note: ""});
            saveData();
        }

        window.saveNote = function(btn) { alert("Note saved!"); saveData(); };
        window.deleteMarker = function(btn) {
            if (confirm("Delete this marker?")) {
                const marker = btn.closest('.leaflet-popup')._source;
                if (marker) marker.remove();
                saveData();
            }
        };

        function renderLayerList() {
            const cont = document.getElementById('layers-list');
            cont.innerHTML = '';
            Object.keys(layers).forEach(name => {
                const div = document.createElement('div');
                div.className = 'layer-item';
                div.innerHTML = `
                    <input type="checkbox" checked onchange="toggleLayer('${name}', this.checked)">
                    <span onclick="setCurrentLayer('${name}')" style="flex:1">${name}</span>
                    <button onclick="deleteLayer('${name}')" style="background:none; color:#ff6666; border:none; font-size:1.4em;">×</button>
                `;
                cont.appendChild(div);
            });
        }

        function toggleLayer(name, show) {
            if (show) layers[name].addTo(map); else map.removeLayer(layers[name]);
        }

        function setCurrentLayer(name) {
            currentLayerName = name;
            document.getElementById('current-layer').value = name;
        }

        function addNewLayer() {
            const name = prompt("New layer name:", "New Layer");
            if (!name || layers[name]) return;
            layerData[name] = [];
            createLayer(name);
            renderLayerList();
            setCurrentLayer(name);
            saveData();
        }

        function deleteLayer(name) {
            if (!confirm(`Delete layer "${name}" and all markers?`)) return;
            map.removeLayer(layers[name]);
            delete layers[name];
            delete layerData[name];
            renderLayerList();
            if (currentLayerName === name) setCurrentLayer(Object.keys(layers)[0] || "Default");
            saveData();
        }

        function locateMe() { map.locate({setView:true, maxZoom:16}); }

        function toggleMeasure() {
            measureMode = !measureMode;
            measurePoints = [];
            alert(measureMode ? "Tap two points on the map" : "Measure mode off");
        }

        function handleMeasure(latlng) {
            measurePoints.push(latlng);
            L.marker(latlng).addTo(map).bindPopup("Measure point").openPopup();
            if (measurePoints.length === 2) {
                const dist = measurePoints[0].distanceTo(measurePoints[1]) / 1000;
                alert(`Distance: ${dist.toFixed(2)} km`);
                measurePoints = []; measureMode = false;
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(layerData, null, 2)], {type:"application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "elysium-markers.geojson";
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    layerData = JSON.parse(ev.target.result);
                    Object.keys(layers).forEach(n => map.removeLayer(layers[n]));
                    layers = {};
                    Object.keys(layerData).forEach(n => createLayer(n));
                    renderLayerList();
                    saveData();
                    alert("Imported successfully!");
                } catch(err) { alert("Invalid GeoJSON file"); }
            };
            reader.readAsText(file);
        }

        // ================== STORAGE MONITORING ==================
        async function updateStorageInfo() {
            const infoEl = document.getElementById('storage-info');
            if (!navigator.storage || !navigator.storage.estimate) {
                infoEl.textContent = "Storage info not available";
                return;
            }
            try {
                const estimate = await navigator.storage.estimate();
                const usedMB = (estimate.usage / (1024 * 1024)).toFixed(1);
                let html = `Storage used: ${usedMB} MB`;
                if (parseFloat(usedMB) > 150) {
                    html += '<br><span class="warning">⚠️ Cache is large</span>';
                }
                infoEl.innerHTML = html;
            } catch (e) {
                infoEl.textContent = "Storage info unavailable";
            }
        }

        function initStorageMonitoring() {
            updateStorageInfo();
            setInterval(updateStorageInfo, 8000);
            map.on('moveend zoomend', () => setTimeout(updateStorageInfo, 1500));
        }

        // ================== CLEAR OLD CACHE ==================
        async function clearOldCache() {
            if (!('serviceWorker' in navigator)) {
                alert("Service Worker not supported.");
                return;
            }
            if (!confirm("Clear all cached map tiles older than 30 days?\n\nYou may need to re-download tiles when online again.")) {
                return;
            }
            try {
                const registration = await navigator.serviceWorker.ready;
                if (registration.active) {
                    registration.active.postMessage({ action: 'clearOldCache' });
                    alert("Cleanup started. Check console for progress.");
                } else {
                    alert("Service Worker not active yet. Refresh the page and try again.");
                }
            } catch (err) {
                alert("Failed to clear cache: " + err.message);
            }
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker failed:', err));
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
